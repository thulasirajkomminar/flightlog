name: Docs CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

jobs:
  build:
    name: Build (mkdocs --strict)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: docs/uv.lock

      - name: Sync Python deps
        run: uv sync --locked

      - name: mkdocs build --strict
        run: uv run mkdocs build --strict

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            docs/content/**/*.md
          config: docs/.markdownlint.jsonc

  prettier:
    name: Prettier
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check YAML / JSON formatting
        run: npx --yes prettier@3 --check "mkdocs.yml" "*.json" "*.jsonc"

  cspell:
    name: Spell check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          config: docs/.cspell.json
          files: docs/content/**/*.md
          incremental_files_only: false

  links:
    name: Link check (lychee)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config docs/.lychee.toml
            --no-progress
            docs/content/**/*.md
          fail: true
